<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Cornucopia Lodge #563</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .thank-you-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(44, 36, 22, 0.8), rgba(44, 36, 22, 0.8)), url('wp-content/uploads/2025/02/masonic-bg-4.jpg');
            background-size: cover;
            background-position: center;
            padding: 40px;
        }
        .thank-you-content {
            text-align: center;
            color: white;
            max-width: 600px;
        }
        .thank-you-icon {
            width: 80px;
            height: 80px;
            background: var(--color-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
        }
        .thank-you-content h1 {
            font-family: var(--font-heading);
            font-size: 42px;
            margin-bottom: 20px;
        }
        .thank-you-content p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="thank-you-page">
        <div class="thank-you-content">
            <div class="thank-you-icon">✓</div>
            <h1>Thank You!</h1>
            <p>Your message has been received. We appreciate you reaching out to Cornucopia Lodge #563. A member of our lodge will contact you soon.</p>
            <a href="index.html" class="btn btn-primary">Return to Homepage</a>
        </div>
    </div>
</body>
</html>
