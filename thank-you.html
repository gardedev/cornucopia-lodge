<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Cornucopia Lodge #563</title>
    <link rel="stylesheet" href="wp-content/themes/musea/style.css">
    <link rel="stylesheet" href="wp-content/themes/musea/assets/css/modules.min.css">
    <style>
        body {
            font-family: 'Cinzel', serif;
            background-color: #f5f0e8;
            margin: 0;
            padding: 0;
        }
        .thank-you-container {
            max-width: 800px;
            margin: 100px auto;
            text-align: center;
            padding: 60px 40px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .thank-you-icon {
            font-size: 64px;
            color: #c9ab81;
            margin-bottom: 30px;
        }
        .thank-you-title {
            font-size: 36px;
            color: #2c2416;
            margin-bottom: 20px;
        }
        .thank-you-message {
            font-size: 18px;
            color: #5c5140;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background-color: #c9ab81;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .btn-home:hover {
            background-color: #b89a70;
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <div class="thank-you-icon">✓</div>
        <h1 class="thank-you-title">Thank You!</h1>
        <p class="thank-you-message">
            Your message has been received. We appreciate you reaching out to Cornucopia Lodge #563.<br>
            A member of our lodge will contact you soon.
        </p>
        <a href="index.html" class="btn-home">Return to Homepage</a>
    </div>
</body>
</html>
